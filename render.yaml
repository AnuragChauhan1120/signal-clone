services:
  - type: web
    name: signal-clone-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./signal_clone.db
      - key: CORS_ORIGINS
        sync: false
